<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <script>!function(){try{var t=localStorage.getItem("invenew-theme")||(window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);if(t==="dark"){document.documentElement.style.background="#111111";document.documentElement.style.colorScheme="dark"}}catch(e){}}();</script><!-- theme-init-inline -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Article | INVENEW</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    /* ── Post layout ── */
    .post-wrap   { max-width: 740px; }
    .post-header { margin-bottom: 36px; }
    .post-meta   { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .post-meta time { font-size: 13px; color: var(--color-text-faint); }
    .post-meta .post-author { font-size: 13px; color: var(--color-text-faint); }
    .post-header h1 {
      font-size: clamp(24px, 4vw, 38px);
      font-weight: 700;
      line-height: 1.25;
      color: var(--color-text);
      margin-bottom: 0;
    }
    .post-hero-img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: var(--radius-lg);
      margin-bottom: 36px;
      display: block;
    }

    /* ── Prose body ── */
    .post-body { font-size: 16px; line-height: 1.8; color: var(--color-text-muted); }
    .post-body p   { margin-bottom: 20px; }
    .post-body h1, .post-body h2 { font-size: clamp(18px, 2.5vw, 24px); font-weight: 700; color: var(--color-text); margin: 40px 0 14px; line-height: 1.3; }
    .post-body h3, .post-body h4 { font-size: 18px; font-weight: 600; color: var(--color-text); margin: 32px 0 10px; line-height: 1.3; }
    .post-body ul, .post-body ol  { padding-left: 22px; margin-bottom: 20px; }
    .post-body li  { margin-bottom: 8px; }
    .post-body a   { color: var(--color-slate); text-decoration: underline; text-underline-offset: 3px; }
    .post-body a:hover { opacity: 0.8; }
    .post-body strong { color: var(--color-text); font-weight: 600; }
    .post-body code   { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.88em;
                        background: var(--color-bg-secondary); padding: 2px 6px; border-radius: 4px; }
    .post-body blockquote {
      border-left: 3px solid var(--color-slate);
      margin: 28px 0; padding: 12px 0 12px 20px;
      color: var(--color-text-muted); font-style: italic;
    }
    .post-body img { max-width: 100%; height: auto; border-radius: var(--radius-md); margin: 20px 0; display: block; }
    .post-body s   { opacity: 0.6; }

    /* ── Back link ── */
    .post-back { display: inline-flex; align-items: center; gap: 6px; font-size: 14px;
                 color: var(--color-text-muted); margin-bottom: 32px; transition: color var(--transition); }
    .post-back:hover { color: var(--color-text); }
    .post-back svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2;
                     fill: none; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Text-to-Speech ── */
    .post-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
    }
    .tts-listen-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--color-text-muted);
      background: transparent;
      border: 1px solid var(--color-border-med);
      border-radius: var(--radius-pill);
      padding: 5px 13px 5px 9px;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition), background var(--transition);
      line-height: 1;
    }
    .tts-listen-btn svg {
      width: 14px; height: 14px;
      flex-shrink: 0;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tts-listen-btn:hover {
      color: var(--color-text);
      border-color: var(--color-text-muted);
    }
    .tts-listen-btn.playing {
      color: var(--color-amber);
      border-color: var(--color-amber);
      background: rgba(194,153,60,0.07);
    }
    [data-theme="dark"] .tts-listen-btn.playing {
      background: rgba(212,168,64,0.10);
    }
    .tts-listen-btn.paused {
      color: var(--color-text-muted);
      border-color: var(--color-border-med);
    }
    /* TTS sticky bar */
    .tts-bar {
      position: fixed;
      bottom: -80px;
      left: 0; right: 0;
      height: 60px;
      background: var(--color-bg);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      z-index: 300;
      transition: bottom 0.32s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 -6px 28px rgba(0,0,0,0.08);
    }
    .tts-bar.visible { bottom: 0; }
    .tts-bar-play {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--color-amber);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity var(--transition), transform var(--transition);
    }
    .tts-bar-play:hover { opacity: 0.82; transform: scale(1.06); }
    .tts-bar-play svg {
      width: 13px; height: 13px;
      fill: currentColor;
      stroke: none;
    }
    .tts-bar-info { flex: 1; min-width: 0; }
    .tts-bar-label {
      font-size: 11px;
      color: var(--color-text-faint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }
    .tts-track {
      height: 3px;
      background: var(--color-border);
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
    }
    .tts-track-fill {
      height: 100%;
      width: 0%;
      background: var(--color-amber);
      border-radius: 2px;
      transition: width 0.4s linear;
    }
    .tts-speed-btn {
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-muted);
      background: var(--color-bg-secondary);
      border: none;
      border-radius: var(--radius-pill);
      padding: 4px 10px;
      cursor: pointer;
      flex-shrink: 0;
      letter-spacing: 0.03em;
      min-width: 36px;
      text-align: center;
      transition: color var(--transition), background var(--transition);
    }
    .tts-speed-btn:hover { color: var(--color-text); }
    .tts-bar-close {
      width: 28px; height: 28px;
      border: none;
      background: transparent;
      color: var(--color-text-faint);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: color var(--transition), background var(--transition);
    }
    .tts-bar-close:hover {
      color: var(--color-text);
      background: var(--color-bg-secondary);
    }
    .tts-bar-close svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      fill: none;
    }

    /* ── Loading / error states ── */
    .post-loading { display: flex; flex-direction: column; align-items: center;
                    padding: 80px 0; gap: 16px; color: var(--color-text-faint); font-size: 14px; }
    .post-loading .spinner { width: 22px; height: 22px; border: 2px solid var(--color-border);
                             border-top-color: var(--color-amber); border-radius: 50%;
                             animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .post-error { text-align: center; padding: 80px 0; color: var(--color-text-muted); }
    .post-error h2 { font-size: 20px; margin-bottom: 10px; }
    .post-error a  { color: var(--color-slate); }
  </style>
  <script src="assets/js/main.js" defer></script>
  <script src="assets/js/components.js" defer></script>
</head>

<script>
(function () {
  'use strict';

  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function formatDate(str) {
    if (!str) return '';
    try {
      return new Date(str).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    } catch (e) { return str; }
  }

  function getSlug() {
    var params = new URLSearchParams(window.location.search);
    return (params.get('slug') || '').trim();
  }

  function showError(msg) {
    document.getElementById('post-content').innerHTML =
      '<div class="post-error">' +
        '<h2>' + esc(msg || 'Article not found.') + '</h2>' +
        '<p><a href="blog.html">&larr; Back to blog</a></p>' +
      '</div>';
  }

  function render(post) {
    var date   = formatDate(post.publishedAt || post._createdAt);
    var cat    = (post.category && post.category.title) || (post.tag && post.tag.title) || '';
    var author = post.author && post.author.name ? post.author.name : '';

    // Update page title and meta description
    if (post.title) {
      document.title = esc(post.title) + ' | INVENEW';
      var metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', esc(post.title) + ', INVENEW Intelligence');
    }

    var heroImg = post.imageUrl
      ? '<img class="post-hero-img" src="' + esc(post.imageUrl) + '?w=1200&h=675&fit=crop&auto=format&q=85" ' +
          'alt="' + esc(post.title) + '" loading="eager">'
      : '';

    var metaParts = [];
    if (cat)    metaParts.push('<span class="card-tag">' + esc(cat) + '</span>');
    if (date)   metaParts.push('<time>' + esc(date) + '</time>');
    if (author) metaParts.push('<span class="post-author">By ' + esc(author) + '</span>');

    var ttsBtn = window.speechSynthesis
      ? '<div class="post-toolbar">' +
          '<button class="tts-listen-btn" id="tts-listen-btn" aria-label="Listen to article">' +
            '<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>' +
            '<path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>' +
            '<path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>' +
            '<span>Listen</span>' +
          '</button>' +
        '</div>'
      : '';

    document.getElementById('post-content').innerHTML =
      '<div class="post-header">' +
        (metaParts.length ? '<div class="post-meta">' + metaParts.join('') + '</div>' : '') +
        '<h1>' + esc(post.title || 'Untitled') + '</h1>' +
        ttsBtn +
      '</div>' +
      heroImg +
      '<div class="post-body">' + (post.bodyHtml || '<p>No content available.</p>') + '</div>';
  }

  function load() {
    var slug = getSlug();
    if (!slug) { showError('No article specified.'); return; }

    fetch('/api/post?slug=' + encodeURIComponent(slug))
      .then(function (res) {
        if (res.status === 404) throw new Error('not_found');
        if (!res.ok) throw new Error('http_' + res.status);
        return res.json();
      })
      .then(function (data) {
        if (!data.result) throw new Error('not_found');
        render(data.result);
        initTTS(data.result.title || '');
      })
      .catch(function (err) {
        if (err.message === 'not_found') {
          showError('Article not found.');
        } else {
          showError('Could not load article. Please try again.');
        }
        console.error('[INVENEW] post load error:', err);
      });
  }

  /* ── Text-to-Speech ─────────────────────────────────────── */
  function initTTS(title) {
    if (!window.speechSynthesis) return;

    var listenBtn  = document.getElementById('tts-listen-btn');
    var bar        = document.getElementById('tts-bar');
    var playPause  = document.getElementById('tts-play-pause');
    var closeBtn   = document.getElementById('tts-close');
    var speedBtn   = document.getElementById('tts-speed-btn');
    var fill       = document.getElementById('tts-track-fill');
    var barLabel   = document.getElementById('tts-bar-label');

    if (!listenBtn || !bar) return;

    var state     = 'idle';   // 'idle' | 'playing' | 'paused'
    var speeds    = [1, 1.25, 1.5, 2];
    var speedIdx  = 0;
    var utterance = null;
    var fullText  = '';
    var lastChar  = 0;

    /* ── SVG icon snippets ── */
    var I_LISTEN = '<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>' +
                   '<path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>' +
                   '<path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
    var I_PAUSE  = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none">' +
                   '<rect x="6" y="4" width="4" height="16" rx="1"/>' +
                   '<rect x="14" y="4" width="4" height="16" rx="1"/></svg>';
    var I_RESUME = '<svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>' +
                   '<line x1="15" y1="9" x2="20" y2="9"/>' +
                   '<line x1="15" y1="12" x2="20" y2="12"/>' +
                   '<line x1="15" y1="15" x2="20" y2="15"/></svg>';
    var I_PLAY   = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none">' +
                   '<polygon points="5 3 19 12 5 21 5 3"/></svg>';

    function getArticleText() {
      var body = document.querySelector('.post-body');
      return body ? (body.innerText || body.textContent || '').trim() : '';
    }

    function updateListenBtn(s) {
      if (s === 'playing') {
        listenBtn.className = 'tts-listen-btn playing';
        listenBtn.setAttribute('aria-label', 'Pause reading');
        listenBtn.innerHTML = I_PAUSE + '<span>Pause</span>';
      } else if (s === 'paused') {
        listenBtn.className = 'tts-listen-btn paused';
        listenBtn.setAttribute('aria-label', 'Resume reading');
        listenBtn.innerHTML = I_RESUME + '<span>Resume</span>';
      } else {
        listenBtn.className = 'tts-listen-btn';
        listenBtn.setAttribute('aria-label', 'Listen to article');
        listenBtn.innerHTML = I_LISTEN + '<span>Listen</span>';
      }
    }

    function updateBarBtn(s) {
      playPause.innerHTML = s === 'playing' ? I_PAUSE : I_PLAY;
      playPause.setAttribute('aria-label', s === 'playing' ? 'Pause' : 'Play');
    }

    function setState(s) {
      state = s;
      updateListenBtn(s);
      updateBarBtn(s);
      var visible = s !== 'idle';
      bar.classList.toggle('visible', visible);
      bar.setAttribute('aria-hidden', visible ? 'false' : 'true');
    }

    /* ── Voice selection ──────────────────────────────────────
       Voices load asynchronously in Chrome; we cache them once
       available and pick the highest-quality English voice we can find.
    ───────────────────────────────────────────────────────── */
    var cachedVoices = [];

    // Ordered list of known high-quality voices across platforms
    var VOICE_PRIORITY = [
      // Edge / Chrome on Windows, Microsoft Neural (best free voices on Windows)
      'Microsoft Aria Online (Natural) - English (United States)',
      'Microsoft Jenny Online (Natural) - English (United States)',
      'Microsoft Guy Online (Natural) - English (United States)',
      'Microsoft Aria',
      'Microsoft Jenny',
      'Microsoft Zira',
      // Chrome on any platform, Google Neural
      'Google UK English Female',
      'Google US English',
      'Google UK English Male',
      // macOS / iOS Premium / Enhanced (downloaded from Accessibility settings)
      'Samantha (Premium)',
      'Ava (Premium)',
      'Allison (Premium)',
      'Tom (Premium)',
      'Susan (Premium)',
      // macOS / iOS standard built-ins
      'Samantha',
      'Alex',
      'Karen',
      'Daniel',
      'Moira',
    ];

    function pickVoice(voices) {
      // 1. Try exact name match from priority list
      for (var p = 0; p < VOICE_PRIORITY.length; p++) {
        for (var v = 0; v < voices.length; v++) {
          if (voices[v].name === VOICE_PRIORITY[p]) return voices[v];
        }
      }
      // 2. Any voice whose name contains quality keywords
      var neural = voices.filter(function(v) {
        return /^en/i.test(v.lang) &&
               /(natural|neural|enhanced|premium|online)/i.test(v.name);
      });
      if (neural.length) {
        // Prefer female voices for slightly higher intelligibility scores
        return neural.find(function(v) { return /female|aria|jenny|ava|samantha|karen/i.test(v.name); })
               || neural[0];
      }
      // 3. Any en-US voice
      return voices.find(function(v) { return /en[-_]US/i.test(v.lang); })
          || voices.find(function(v) { return /^en/i.test(v.lang); })
          || null;
    }

    function loadVoices() {
      var v = window.speechSynthesis.getVoices();
      if (v.length) cachedVoices = v;
    }
    loadVoices(); // already available on Safari / Firefox
    if (typeof window.speechSynthesis.onvoiceschanged !== 'undefined') {
      window.speechSynthesis.onvoiceschanged = loadVoices; // async load on Chrome
    }

    function speak(fromChar) {
      window.speechSynthesis.cancel();
      if (!fullText) fullText = getArticleText();
      var text = fromChar > 0 ? fullText.slice(fromChar) : fullText;
      if (!text.trim()) return;

      utterance = new SpeechSynthesisUtterance(text);
      utterance.rate  = speeds[speedIdx];
      utterance.pitch = 1;
      utterance.lang  = 'en-US';

      // Re-fetch voices in case they loaded after page open
      if (!cachedVoices.length) loadVoices();
      var best = pickVoice(cachedVoices);
      if (best) utterance.voice = best;

      if (barLabel) barLabel.textContent = title;

      utterance.onboundary = function(e) {
        if (e.name === 'word' && e.charIndex != null) {
          var abs = fromChar + e.charIndex;
          lastChar = abs;
          var pct = Math.min(99, Math.round((abs / fullText.length) * 100));
          fill.style.width = pct + '%';
        }
      };

      utterance.onend = function() {
        fill.style.width = '100%';
        setTimeout(function() {
          setState('idle');
          fill.style.width = '0%';
          lastChar = 0;
        }, 700);
      };

      utterance.onerror = function(ev) {
        if (ev.error !== 'interrupted' && ev.error !== 'canceled') {
          setState('idle');
          fill.style.width = '0%';
        }
      };

      window.speechSynthesis.speak(utterance);
    }

    listenBtn.addEventListener('click', function() {
      if (state === 'idle')    { lastChar = 0; speak(0); setState('playing'); }
      else if (state === 'playing') { window.speechSynthesis.pause(); setState('paused'); }
      else if (state === 'paused')  { window.speechSynthesis.resume(); setState('playing'); }
    });

    playPause.addEventListener('click', function() {
      if (state === 'playing') { window.speechSynthesis.pause(); setState('paused'); }
      else if (state === 'paused') { window.speechSynthesis.resume(); setState('playing'); }
      else { lastChar = 0; speak(0); setState('playing'); }
    });

    closeBtn.addEventListener('click', function() {
      window.speechSynthesis.cancel();
      setState('idle');
      fill.style.width = '0%';
      lastChar = 0;
      fullText = '';
    });

    speedBtn.addEventListener('click', function() {
      speedIdx = (speedIdx + 1) % speeds.length;
      var label = speeds[speedIdx] === 1 ? '1×' : speeds[speedIdx] + '×';
      speedBtn.textContent = label;
      speedBtn.setAttribute('aria-label', 'Playback speed: ' + label);
      // Restart at current position with new speed
      if (state === 'playing') {
        speak(lastChar);
        setState('playing');
      }
    });

    window.addEventListener('pagehide',     function() { window.speechSynthesis.cancel(); });
    window.addEventListener('beforeunload', function() { window.speechSynthesis.cancel(); });
  }

  document.addEventListener('DOMContentLoaded', load);
})();
</script>

</body>
</html>
